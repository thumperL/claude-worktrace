name: Package and Release Skills

on:
  push:
    tags:
      - 'v*'

# Minimum permissions — only what's needed to create releases
permissions:
  contents: write

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Python 3.9 compatibility
        run: |
          python3 --version
          python3 tests/test_python39_compat.py

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin manifest
        run: python3 -m json.tool .claude-plugin/plugin.json > /dev/null

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
