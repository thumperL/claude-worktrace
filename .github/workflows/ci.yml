name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Read-only — PRs from forks get no write access
permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Python 3.9 compatibility
        run: |
          python3 --version
          python3 tests/test_python39_compat.py
